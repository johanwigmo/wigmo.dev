colorScheme = "congo"
defaultAppearance = "light"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true
enableImageLazyLoading = true
enableImageWebp = true

mainSections = ["updates"]
description = "App development by Johan Wigmo"

[header]
  layout = "basic"
  showTitle = true

[footer]
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"
  showRecent = true
  recentLimit = 5

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = false
  showBreadcrumbs = true
  showTableOfContents = false
  showTaxonomies = true
  showWordCount = false
  showEdit = false
  showComments = false
  showPagination = true

[list]
  showBreadcrumbs = true
  showTableOfContents = false
  groupByYear = true

[taxonomy]
  showTermCount = true
